global:
  timeout_seconds: 25
  max_retries: 3

  # Scraping etiquette & stability
  respect_robots_txt: true        # set to false if a site blocks via robots.txt
  cache_ttl_seconds: 900          # 15 minutes in-memory cache
  max_urls_per_site: 250          # hard cap to prevent runaway discovery

  user_agents:
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0 Safari/537.36"
    - "Mozilla/5.0 (Macintosh; Intel Mac OS X 13_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Safari/605.1.15"
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0 Safari/537.36"

sites:

  - name: "Sakuras Card Shop"
    mode: "shopify_collection"
    adapter: "sakuras"
    shopify_js_fallback: true
    throttle_seconds: 2.5
    currency: "USD"
    shipping:
      type: "unknown"
    collection_pages:
      - "https://sakurascardshop.com/collections/all"
    max_collection_pages: 3

  - name: "Dots Card Shop"
